<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <header class="w-full bg-[#fcfcfc] font-sans antialiased shadow-sm select-none">
  
  <div class="hidden lg:block w-full">
    <div class="max-w-[1440px] mx-auto px-4 py-4 flex items-center justify-between gap-4 text-sm text-[#555555]">
      
      <div class="flex items-center">
        <img src="./images_abdullo/logo.svg" alt="" class="h-16 w-auto object-contain" />
      </div>

      <div class="flex flex-col items-start">
        <a href="tel:84959260603" class="text-xl font-bold text-[#006699] hover:text-[#004466] transition-colors">8 (495) 926-06-03</a>
        <div class="flex items-center gap-1.5 mt-0.5 text-xs text-[#444444]">
          <img src="./images_abdullo/social.png" alt="" class="w-4 h-4" />
          <span>Whatsapp</span>
        </div>
      </div>

      <div class="flex flex-col items-start">
        <span class="text-xs text-[#777777]">info@gomedcentre.ru</span>
        <a href="#" class="text-sm border-b border-dashed border-[#555555] text-[#555555] hover:text-[#006699] hover:border-[#006699] transition-colors mt-0.5">Заказать звонок</a>
      </div>

      <div class="max-w-[180px] text-xs text-[#666666] leading-relaxed">
        г. Мытищи, ул. Рождественская, д.7
      </div>

      <div class="text-xs text-[#666666] leading-relaxed">
        Ежедневно<br />с 9.00 до 21.00
      </div>

      <div class="flex items-center gap-3">
        <button class="w-10 h-10 flex items-center justify-center bg-[#00c5c3] hover:bg-[#00a3a1] text-white rounded transition-colors">
          <img src="./images_abdullo/zoom-search.png" alt="" class="w-5 h-5" />
        </button>
        <a href="#" class="h-10 px-5 flex items-center justify-center bg-[#eef5fa] hover:bg-[#deebf5] text-[#004b73] font-medium rounded transition-colors text-sm">
          Личный кабинет
        </a>
      </div>

    </div>

    <div class="w-full bg-white border-t border-b border-gray-100 mt-2">
      <div class="max-w-[1440px] mx-auto px-4 flex items-center justify-between py-1.5">
        <nav class="flex items-center gap-6 font-semibold text-[#111111]">
          <div class="relative group">
            <button class="flex items-center gap-1 hover:text-[#006699] py-2 transition-colors">
              <a href="">Page 1</a>
              <img src="./images_abdullo/Polygon 1.png" alt="" class="w-2.5 h-1.5 mt-0.5" />
            </button>
          </div>
          <a href="#" class="hover:text-[#006699] py-2 transition-colors">Page 2</a>
          <a href="#" class="hover:text-[#006699] py-2 transition-colors">Page 3</a>
          <a href="#" class="hover:text-[#006699] py-2 transition-colors">Page 4</a>
          <a href="#" class="hover:text-[#006699] py-2 transition-colors">Акции</a>
          <div class="relative group">
            <button class="flex items-center gap-1 hover:text-[#006699] py-2 transition-colors">
              <a href="#">О центре</a>
              <img src="./images_abdullo/Polygon 1.png" alt="" class="w-2.5 h-1.5 mt-0.5" />
            </button>
          </div>
          <a href="#" class="hover:text-[#006699] py-2 transition-colors">Детство</a>
          <a href="#" class="hover:text-[#006699] py-2 transition-colors">Контакты</a>
        </nav>

        <div class="flex items-center gap-4">
          <button class="flex items-center gap-2 text-xs text-[#555555] hover:text-[#006699] transition-colors">
            <img src="./images_abdullo/icon.png" alt="" class="w-6 h-auto" />
            <span>Версия для слабовидящих</span>
          </button>
          <a href="#" class="h-11 px-6 flex items-center justify-center bg-[#005a8c] hover:bg-[#00466d] text-white font-semibold rounded text-sm tracking-wide transition-colors shadow-sm">
            Запись на приём
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="block lg:hidden w-full px-4 py-3 bg-white border-b border-gray-100">
    <div class="flex items-center justify-between">
      
      <div class="flex items-center">
        <img src="./images_abdullo/logo.svg" alt="" class="h-12 w-auto object-contain" />
      </div>

      <div class="flex items-center gap-5">
        <a href="class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 active:bg-gray-100 transition-colors">
          <img src="./images_abdullo/call.png" alt="" class="w-5 h-5 text-[#444444]" />
        </a>
        
        <button class="flex items-center gap-2 text-[#444444] active:text-black transition-colors focus:outline-none">
          <span class="text-base font-medium text-[#7a869a]">Меню</span>
          <img src="./images_abdullo/image.png" alt="" class="w-7 h-auto" />
        </button>
      </div>

    </div>
  </div>

</header>

</html>
